<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#05070d">
  <title>Arena 3D · 第三代真人比例英雄</title>
  <style>
    :root{--accent:#ff4f68;--gold:#efc987;--panel:#08111dde}
    *{box-sizing:border-box}
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#05070d;color:#f7f1e9;font-family:Inter,system-ui,-apple-system,"Microsoft YaHei",sans-serif;touch-action:none;-webkit-user-select:none;user-select:none}
    body:before{content:"";position:fixed;inset:0;background:radial-gradient(ellipse at 50% 36%,#243247 0,#0b111d 41%,#03050a 78%);pointer-events:none}
    #stage,canvas{position:fixed;inset:0;width:100%;height:100%;display:block}
    #stage{z-index:1}
    #loading{position:fixed;inset:0;z-index:30;display:grid;place-items:center;background:radial-gradient(circle at 50% 42%,#192336,#05070d 62%);transition:opacity .45s}
    #loading.hide{opacity:0;pointer-events:none}
    .load-card{width:min(380px,80vw);text-align:center}
    .load-mark{font-size:44px;color:var(--accent);filter:drop-shadow(0 0 22px #ff4f68aa);animation:pulse 1.15s ease-in-out infinite}
    .load-title{margin-top:13px;font-weight:950;letter-spacing:.16em}
    .load-sub{margin-top:7px;color:#91a2b6;font-size:12px}
    .load-track{height:3px;margin-top:18px;border-radius:99px;background:#ffffff12;overflow:hidden}
    .load-bar{height:100%;width:42%;background:linear-gradient(90deg,transparent,var(--accent),#fff);box-shadow:0 0 18px var(--accent);animation:loading 1.1s ease-in-out infinite}
    @keyframes loading{from{transform:translateX(-120%)}to{transform:translateX(270%)}}
    @keyframes pulse{50%{transform:scale(1.08);opacity:.76}}

    .top{position:fixed;z-index:7;left:max(16px,env(safe-area-inset-left));right:max(16px,env(safe-area-inset-right));top:max(12px,env(safe-area-inset-top));display:flex;align-items:flex-start;justify-content:space-between;gap:12px;pointer-events:none;text-shadow:0 3px 18px #000}
    .eyebrow{color:#e8c788;font-size:10px;font-weight:850;letter-spacing:.22em;text-transform:uppercase}
    h1{margin:3px 0 0;font-size:clamp(18px,3vw,31px);line-height:1.05;letter-spacing:.07em;font-weight:950}
    .subtitle{margin-top:5px;color:#9dacbd;font-size:11px}
    .quality{display:flex;gap:6px;align-items:center;padding:7px 11px;border:1px solid #f4cf8d66;border-radius:999px;background:#0a111ce6;color:#f6dca7;font-size:10px;font-weight:850;letter-spacing:.05em;backdrop-filter:blur(10px)}
    .quality i{width:6px;height:6px;border-radius:50%;background:#5ef0be;box-shadow:0 0 9px #5ef0be}

    .info{position:fixed;z-index:8;left:max(16px,env(safe-area-inset-left));bottom:calc(83px + env(safe-area-inset-bottom));width:min(390px,calc(100% - 32px));padding:14px 17px 15px;border-radius:18px;background:linear-gradient(118deg,#08111def,#101929dc);border:1px solid #ffffff24;box-shadow:0 18px 55px #000b,inset 0 1px #ffffff0e;backdrop-filter:blur(16px);pointer-events:none;overflow:hidden}
    .info:before{content:"";position:absolute;inset:0 auto 0 0;width:3px;background:linear-gradient(var(--accent),var(--gold));box-shadow:0 0 20px var(--accent)}
    .hero-name{font-family:Georgia,"Noto Serif SC",serif;font-size:clamp(25px,4vw,38px);font-weight:900;letter-spacing:.08em;color:#fff;text-shadow:0 0 22px #ff4f6877}
    .hero-role{margin-top:2px;color:#f0cc8b;font-weight:850;font-size:12px;letter-spacing:.08em}
    .hero-desc{margin-top:7px;color:#9eafc0;font-size:11px;line-height:1.55}
    .stats{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap}.stats span{padding:4px 7px;border-radius:6px;background:#ffffff0b;border:1px solid #ffffff14;color:#b9c7d5;font-size:9px;font-weight:750}

    .hint{position:fixed;z-index:6;right:max(16px,env(safe-area-inset-right));top:72px;color:#74869b;font-size:10px;line-height:1.6;text-align:right;pointer-events:none}
    .actions{position:fixed;z-index:10;left:50%;transform:translateX(-50%);bottom:max(10px,env(safe-area-inset-bottom));display:flex;justify-content:center;gap:7px;padding:7px;border:1px solid #ffffff18;border-radius:17px;background:#060b13d9;box-shadow:0 12px 35px #000b;backdrop-filter:blur(18px)}
    button{appearance:none;border:1px solid #ffffff20;background:linear-gradient(180deg,#162235e8,#0b1422e8);color:#cbd7e5;min-width:68px;height:52px;padding:6px 10px;border-radius:12px;font:800 11px inherit;touch-action:manipulation;box-shadow:inset 0 1px #ffffff0d;transition:.18s}
    button span{display:block;font-size:17px;line-height:18px;margin-bottom:3px}
    button.active{color:#fff;border-color:var(--accent);background:linear-gradient(180deg,#602334e8,#251522e8);box-shadow:0 0 22px #ff4f684d,inset 0 1px #ffffff20;transform:translateY(-2px)}
    button:active{transform:scale(.96)}
    .stamp{position:fixed;z-index:5;right:max(18px,env(safe-area-inset-right));bottom:calc(90px + env(safe-area-inset-bottom));width:82px;height:82px;display:grid;place-items:center;border:1px solid #efc98766;border-radius:50%;color:#efc98799;font-family:serif;font-weight:900;letter-spacing:.08em;transform:rotate(-10deg);pointer-events:none;box-shadow:inset 0 0 0 5px #05070d,0 0 0 1px #efc98733;text-align:center;font-size:12px}

    @media(max-width:700px){
      .top{top:max(9px,env(safe-area-inset-top));left:max(12px,env(safe-area-inset-left));right:max(12px,env(safe-area-inset-right))}.subtitle,.hint{display:none}.quality{padding:5px 8px;font-size:9px}.eyebrow{font-size:8px}
      .info{left:max(10px,env(safe-area-inset-left));bottom:calc(76px + env(safe-area-inset-bottom));width:min(62vw,310px);padding:10px 12px 11px}.hero-desc{display:none}.hero-name{font-size:22px}.stats{margin-top:7px}.stats span:nth-child(n+3){display:none}
      .stamp{display:none}.actions{left:8px;right:8px;transform:none;bottom:max(7px,env(safe-area-inset-bottom));overflow-x:auto;justify-content:flex-start;padding:5px;scrollbar-width:none}.actions::-webkit-scrollbar{display:none}button{min-width:64px;height:48px;padding:5px 8px}
    }
    @media(max-height:520px) and (orientation:landscape){
      .top{top:7px}.subtitle,.quality,.hint{display:none}.info{left:12px;bottom:70px;width:260px;padding:9px 12px}.hero-name{font-size:21px}.hero-desc,.stats{display:none}.actions{bottom:7px}.stamp{right:14px;bottom:70px;width:62px;height:62px;font-size:10px}
    }
  </style>
</head>
<body>
  <main id="stage" aria-label="可旋转的第三代英雄三维模型"></main>
  <div id="loading"><div class="load-card"><div class="load-mark">☾</div><div class="load-title">正在装配第三代英雄</div><div class="load-sub" id="load-sub">载入真人比例骨骼与独立长发…</div><div class="load-track"><div class="load-bar"></div></div></div></div>
  <header class="top"><div><div class="eyebrow">ARENA 3D · HERO LAB / V3</div><h1>真人比例英雄样板</h1><div class="subtitle">独立头身、手指骨骼、长发、战甲与武器 · 正式游戏暂未替换</div></div><div class="quality"><i></i>非方块人 · 正常八头身</div></header>
  <div class="hint">左右拖动：旋转模型<br>上下拖动：调整视角<br>双指 / 滚轮：缩放</div>
  <section class="info"><div class="hero-name">朔月 · 白曜</div><div class="hero-role">东方月刃战士 / 近战突进</div><div class="hero-desc">银发、玄甲与赤金护肩，装备双月刃。基于真正的全身人体网格和 Humanoid 骨架搭建，不再使用卡通大头基模。</div><div class="stats"><span>约 13K 三角面</span><span>完整手指骨骼</span><span>独立长发</span><span>五套实时动作</span></div></section>
  <div class="stamp">原创英雄<br>试制型</div>
  <nav class="actions" id="actions" aria-label="动作测试"></nav>
  <script type="module" src="./showcase-v3.js"></script>
</body>
</html>
