<style>

:auto}.util{position:relative;width:54px;height:54px;padding:0;border-radius:50%;border:2px solid #7bcfff;color:#fff;background:radial-gradient(circle,#256ead,#0a2348);font:inherit;font-size:20px;box-shadow:0 3px 11px #000;touch-action:none}.util:nth-child(2){border-color:#75ef96;background:radial-gradient(circle,#28a95e,#0c4228)}.util:nth-child(3){border-color:#ffd867;background:radial-gradient(circle,#b77d1f,#4d2707)}.util b{display:block;font-size:8px}.util .cd{position:absolute;inset:0;display:none;align-items:center;justify-content:center;border-radius:50%;background:#02060dcc;font-size:16px}@media(max-height:650px){.minimap{display:block;width:154px;height:116px}.team-strip{left:171px}.skills{transform:scale(.88);transform-origin:right bottom}.utility{right:226px;transform:scale(.88);transform-origin:right bottom}.joy{transform:scale(.86);transform-origin:left bottom}#status{left:172px;top:54px;width:220px}}
/* Real-time hero selection stage */
#select{padding:18px 24px 42px}.select-shell{width:min(1180px,96vw);display:grid;grid-template-columns:minmax(520px,1.2fr) minmax(330px,.8fr);gap:20px;align-items:stretch}.picker-copy{display:flex;flex-direction:column;justify-content:center;min-width:0}.picker-copy h1{align-self:flex-start}.picker-copy .subtitle{text-align:left}.hero-preview-panel{position:relative;min-height:510px;overflow:hidden;border:1px solid #7293bd88;border-radius:24px;background:radial-gradient(circle at 50% 32%,#37557d 0,#15243a 45%,#080e18 78%);box-shadow:inset 0 0 70px #62b6ff18,0 24px 70px #0009}.hero-preview-panel:before{content:"";position:absolute;inset:0;background:linear-gradient(125deg,#ffffff0c,transparent 35%,#58d8ff0b 70%,transparent);pointer-events:none;z-index:2}.hero-preview-label{position:absolute;top:17px;left:18px;z-index:3;padding:6px 10px;border:1px solid #74dcff66;border-radius:999px;background:#07111dcc;color:#8ce8ff;font-size:11px;font-weight:800;letter-spacing:.12em}.hero-preview{position:absolute;inset:0 0 118px}.hero-preview canvas{width:100%!important;height:100%!important;cursor:grab}.hero-preview canvas:active{cursor:grabbing}.preview-meta{position:absolute;z-index:3;left:18px;right:18px;bottom:15px;display:grid;grid-template-columns:1fr auto;gap:5px 14px;align-items:center}.preview-meta small{grid-column:1;color:#79ddff;font-weight:800}.preview-meta strong{grid-column:1;color:#ffe3a4;font-size:25px}.preview-meta p{grid-column:1;margin:0;color:#aebbd0;font-size:12px}.enter-battle{grid-column:2;grid-row:1/4;align-self:center;padding:14px 20px;border:1px solid #ffd477;border-radius:12px;background:linear-gradient(145deg,#b66c20,#5b2d0c);color:#fff3cf;font-weight:900;font-size:16px;box-shadow:0 0 24px #ffb84b40;cursor:pointer}.enter-battle:hover{filter:brightness(1.15);transform:translateY(-1px)}.card{cursor:pointer;transition:.16s ease}.card.selected{border-color:#ffd477;background:linear-gradient(145deg,#304665,#151e30);box-shadow:inset 0 0 28px #ffc45a16,0 0 0 @media(max-height:650px){#select{padding:8px 14px 30px}.select-shell{grid-template-columns:minmax(520px,1fr) 270px;gap:10px}.picker-copy h1{font-size:32px}.picker-copy .subtitle{margin-bottom:8px}.cards{grid-template-columns:repeat(3,minmax(135px,1fr));gap:6px;max-height:none}.card{padding:7px}.portrait{height:38px;font-size:27px;margin-bottom:4px}.card strong{font-size:15px}.card em{display:none}.hero-preview-panel{min-height:330px}.hero-preview{inset:0 0 88px}.preview-meta{left:12px;right:12px;bottom:10px}.preview-meta strong{font-size:19px}.preview-meta p{display:none}.enter-battle{padding:11px 13px;font-size:13px}}

<body>
<div id="loading"><h1>诸界争锋</h1><div class="bar"><i id="progress"></i></div><div id="loadText">正在唤醒六位英雄…</div></div>
<section id="select" class="hidden"><div class="select-shell"><div class="picker-copy"><h1>诸界争锋</h1><div class="subtitle">六位真实3D英雄 · 点击查看模型与动作</div><div class="cards" id="cards"></div></div><aside class="hero-preview-panel"><div class="hero-preview-label">实时 3D 英雄预览</div><div id="heroPreview" class="hero-preview" aria-label="当前英雄三维模型"></div><div class="preview-meta"><small id="previewRole">法师</small><strong id="previewName">雷咒师</strong><p id="previewDesc">拖动旋转 · 自动播放待机动作</p><button id="enterBattle" class="enter-battle">选择并出战</button></div></aside></div><div id="tip">电脑：WASD移动，J普攻，K/L/U技能　·　手机/平板：左摇杆＋右侧按钮</div></section>
<div id="hud" class="hidden"><div class="score"><span class="blue">苍穹 <b id="bk">0</b></span><span id="time">00:00</span><span class="red"><b id="rk">0</b> 赤渊</span></div><div class="perf">FPS <b id="fps">60</b>　延迟 <span class="blue">本地</span>　⚙</div><div id="status"><div><span class="hero-name" id="heroName"></span><small id="level"></small></div><div class="health"><i id="hp"></i></div><div class="mana"><i id="mp"></i></div><div class="xp"><i id="xp"></i></div></div><div id="feed"></div><canvas class="minimap" id="map"></canvas><div class="team-strip" id="teamStrip"></div><div class="joy" id="joy"><div class="knob" id="knob"></div></div><div class="utility"><button class="util" data-u="recall">🌀<b>回城</b><i class="cd"></i></button><button class="util" data-u="heal">✚<b>恢复</b><i class="cd"></i></button><button class="util" data-u="flash">➤<b>闪现</b><i class="cd"></i></button></div><div class="skills"><div class="skill" data-s="0">一<b id="sk0"></b><i class="cd"></i></div><div class="skill" data-s="1">二<b id="sk1"></b><i class="cd"></i></div><div class="skill ult" data-s="2">大<b id="sk2"></b><i class="cd"></i></div><div class="skill attack" data-s="a">⚔<b>普攻</b><i class="cd"></i></div></div></div>
<section id="end" class="hidden"><h2 id="result"></h2><p id="stats"></p><button onclick="location.reload()">再战一局</button></section>
<div id="rotate">请将设备横过来<br>进入诸界战场</div><div id="error"></div>
<script type="module" src="./game.js"></script>
